<div class="app-layout">
  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed()">
    <div class="sidebar-header">
      <div class="logo-box">RT</div>
      <span class="logo-text" *ngIf="!isSidebarCollapsed()">Radar de Tendências</span>
    </div>
    
    <nav class="sidebar-nav">
      <div class="nav-section-title" *ngIf="!isSidebarCollapsed()">Visões</div>
      <a routerLink="/dashboard" [queryParams]="{}" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item" title="Dashboard Geral">
        <i class="pi pi-home"></i>
        <span *ngIf="!isSidebarCollapsed()">Visão Geral</span>
      </a>
      <a routerLink="/dashboard" [queryParams]="{ category: 1 }" routerLinkActive="active" class="nav-item" title="Animes">
        <i class="pi pi-bolt"></i>
        <span *ngIf="!isSidebarCollapsed()">Animes</span>
      </a>
      <a routerLink="/dashboard" [queryParams]="{ category: 2 }" routerLinkActive="active" class="nav-item" title="Filmes e Séries">
        <i class="pi pi-video"></i>
        <span *ngIf="!isSidebarCollapsed()">Filmes e Séries</span>
      </a>
      <a routerLink="/temporadas" routerLinkActive="active" class="nav-item" title="Temporadas">
        <i class="pi pi-calendar"></i>
        <span *ngIf="!isSidebarCollapsed()">Temporadas</span>
      </a>
      <a routerLink="/watchlist" routerLinkActive="active" class="nav-item" title="Minha Watchlist">
        <i class="pi pi-bookmark"></i>
        <span *ngIf="!isSidebarCollapsed()">Minha Watchlist</span>
      </a>
      <a routerLink="/calendario" routerLinkActive="active" class="nav-item" title="Calendário Semanal">
        <i class="pi pi-calendar-clock"></i>
        <span *ngIf="!isSidebarCollapsed()">Calendário Semanal</span>
      </a>
      <a routerLink="/notificacoes" routerLinkActive="active" class="nav-item" title="Central de Alertas">
        <i class="pi pi-bell"></i>
        <span *ngIf="!isSidebarCollapsed()">Central de Alertas</span>
      </a>

      <div class="nav-section-title" *ngIf="!isSidebarCollapsed()" style="margin-top: 1rem;">Configurações</div>
      <a routerLink="/fluxos" routerLinkActive="active" class="nav-item" title="Motor de Regras">
        <i class="pi pi-sitemap"></i>
        <span *ngIf="!isSidebarCollapsed()">Motor de Regras</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="isDarkMode() ? 'Ativar Light Mode' : 'Ativar Dark Mode'">
        <i class="pi" [ngClass]="isDarkMode() ? 'pi-sun' : 'pi-moon'"></i>
        <span *ngIf="!isSidebarCollapsed()">{{ isDarkMode() ? 'Light Mode' : 'Dark Mode' }}</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" (click)="toggleSidebar()">
          <i class="pi pi-bars"></i>
        </button>
        <div class="search-bar">
          <i class="pi pi-search"></i>
          <input type="text" placeholder="Pesquisar (Enter para buscar)..." #searchInput (keyup.enter)="buscarFranquia(searchInput.value)" />
        </div>
      </div>
      
      <div class="topbar-actions">
        <div class="notification-wrapper">
          <button class="bell-btn" (click)="toggleNotifications()">
            <i class="pi pi-bell"></i>
            <span class="badge" *ngIf="unreadCount() > 0">{{ unreadCount() }}</span>
          </button>
          
          <div class="notification-panel" *ngIf="isNotificationsOpen()">
            <div class="panel-header">
              <h4>Notificações Recentes</h4>
            </div>
            <div class="panel-body">
              <div class="alert-item" *ngFor="let alerta of alertas()" [ngClass]="{'unread': !alerta.Lido}" (click)="marcarComoLido(alerta)">
                <div class="alert-icon"><i class="pi pi-exclamation-triangle"></i></div>
                <div class="alert-content">
                  <p [style.color]="alerta.Lido ? 'var(--text-secondary)' : 'var(--text-color)'">{{ alerta.Mensagem }}</p>
                  <span class="alert-date">{{ alerta.DataAlerta | date:'dd/MM/yyyy HH:mm' }}</span>
                </div>
                <div class="unread-dot" *ngIf="!alerta.Lido"></div>
              </div>
              <div class="empty-alerts" *ngIf="alertas().length === 0">
                Nenhum alerta engatilhado.
              </div>
            </div>
          </div>
        </div>

        <div class="user-profile">
          <div class="avatar">U</div>
        </div>
      </div>
    </header>
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
